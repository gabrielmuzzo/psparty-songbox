<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSPARTY</title>

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
color:white;
overflow-x:hidden;

background:
radial-gradient(circle at 20% 20%, rgba(0,140,255,0.25), transparent 40%),
radial-gradient(circle at 80% 10%, rgba(255,255,255,0.12), transparent 40%),
radial-gradient(circle at 50% 90%, rgba(0,80,200,0.25), transparent 40%),
linear-gradient(180deg,#0a0a0a,#000814,#000000);

background-attachment:fixed;
}

body::before{
content:"△ ○ ✕ □   △ ○ ✕ □   △ ○ ✕ □";
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
font-size:120px;
letter-spacing:40px;
color:rgba(255,255,255,0.04);
transform:rotate(-20deg);
pointer-events:none;
z-index:0;
animation:flutuar 18s ease-in-out infinite;
}

.top-bar{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(10px);
padding:12px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.08);
z-index:1000;
font-size:15px;
color:#e0e0e0;
}

.container{
max-width:620px;
margin:auto;
margin-top:70px;
padding:25px;
text-align:center;
position:relative;
z-index:1;
}

.logo{
width:140px;
margin:10px auto 20px auto;
display:block;
filter:drop-shadow(0 5px 15px rgba(0,140,255,0.35));
}

.filtros{
margin-bottom:10px;
}

.filtro-btn{
background:rgba(255,255,255,0.04);
color:#ddd;
border:1px solid rgba(255,255,255,0.12);
padding:7px 14px;
margin:4px;
border-radius:20px;
font-size:13px;
cursor:pointer;
transition:.15s;
}

.filtro-btn:hover{
background:#008cff;
color:white;
border-color:#008cff;
transform:translateY(-2px);
box-shadow:0 4px 10px rgba(0,140,255,0.4);
}

input{
width:90%;
padding:14px 18px;
border-radius:25px;
border:1px solid rgba(255,255,255,0.08);
font-size:16px;
background:#1a1a1a;
color:white;
outline:none;
box-shadow:0 6px 25px rgba(0,0,0,0.6);
margin-bottom:20px;
transition:.15s;
}

input:focus{
border-color:#008cff;
box-shadow:0 0 0 2px rgba(0,140,255,0.25);
}

.card{
background:rgba(30,30,30,0.85);
padding:16px;
margin-bottom:12px;
border-radius:12px;
border-left:4px solid #008cff;
backdrop-filter:blur(6px);
box-shadow:0 6px 20px rgba(0,0,0,0.6);
transition:all .2s;
opacity:0;
transform:translateY(10px);
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card:hover{
transform:scale(1.03);
box-shadow:0 0 15px rgba(0,140,255,0.4),
0 0 30px rgba(0,140,255,0.25);
}

.musica{
font-weight:700;
font-size:18px;
margin-bottom:2px;
}

.artista{
font-size:14px;
color:#dcdcdc;
margin-bottom:6px;
}

.observacao{
font-size:13px;
color:#a9a9a9;
}

.sem-bateria,
.sem-letra,
.sem-guitarra{
color:#ff9a00;
font-weight:bold;
}

#nenhuma{
display:none;
margin-top:20px;
color:#aaa;
}

.popup-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(6px);
z-index:5000;
}

.popup-box{
background:#111;
border:1px solid rgba(255,255,255,0.15);
padding:40px;
border-radius:18px;
text-align:center;
max-width:420px;
box-shadow:0 25px 70px rgba(0,0,0,0.8);
animation:popupEntrada .35s ease;
}

.popup-icones{
font-size:32px;
letter-spacing:12px;
margin-bottom:10px;
color:#008cff;
}

.popup-title{
font-size:24px;
margin-bottom:10px;
}

.popup-text{
color:#ccc;
line-height:1.6;
margin-bottom:25px;
}

.popup-insta{
display:inline-block;
padding:14px 26px;
border-radius:30px;
font-weight:bold;
background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);
color:white;
text-decoration:none;
margin-bottom:15px;
transition:.2s;
}

.popup-insta:hover{
transform:scale(1.08);
}

.popup-btn{
display:block;
margin:15px auto 0 auto;
padding:10px 22px;
border:none;
border-radius:30px;
background:#008cff;
color:white;
cursor:pointer;
}

.popup-btn:hover{
background:#2aa3ff;
}

@keyframes popupEntrada{
from{opacity:0;transform:scale(.85);}
to{opacity:1;transform:scale(1);}
}

@keyframes flutuar{
0%{transform:rotate(-20deg) translateY(0px);}
50%{transform:rotate(-20deg) translateY(-40px);}
100%{transform:rotate(-20deg) translateY(0px);}
}

</style>
</head>

<body>

<div id="popup" class="popup-overlay">
<div class="popup-box">
<div class="popup-icones">△ ○ ✕ □</div>
<div class="popup-title">Sugira músicas 🎶</div>
<div class="popup-text">Deixe sua sugestão de músicas no nosso Instagram 😄</div>

<a class="popup-insta" href="https://instagram.com/pspartyoficial" target="_blank">
Ir para o Instagram
</a>

<button id="popupBtn" class="popup-btn">
Seguir para a lista de músicas
</button>
</div>
</div>

<div class="top-bar">
🎸 <span id="contador">{{ total_banco }}</span> músicas
</div>

<div class="container">

<div class="filtros">

<button class="filtro-btn" onclick="mostrarTodos()">Todos</button>
<button class="filtro-btn" onclick="aplicarFiltro('brasil')">Brasil</button>
<button class="filtro-btn" onclick="aplicarFiltro('kpop')">K-pop</button>
<button class="filtro-btn" onclick="aplicarFiltro('jrock')">J-rock</button>
<button class="filtro-btn" onclick="aplicarFiltro('jpop')">J-pop</button>
<button class="filtro-btn" onclick="aplicarFiltro('anime')">Anime</button>
<button class="filtro-btn" onclick="aplicarFiltro('pop')">Pop</button>
<button class="filtro-btn" onclick="aplicarFiltro('50s-80s')">50s-80s</button>
<button class="filtro-btn" onclick="aplicarFiltro('soundtrack')">Soundtracks</button>
<button class="filtro-btn" onclick="aplicarFiltro('indie')">Indie</button>
<button class="filtro-btn" onclick="aplicarFiltro('rock')">Rock</button>
<button class="filtro-btn" onclick="aplicarFiltro('metal')">Metal</button>
<button class="filtro-btn" onclick="aplicarFiltro('vocaloid')">Vocaloid</button>

</div>

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<input type="text" id="search" placeholder="Pesquisar artista, música ou anime..." autofocus>

<div id="songs">

{% for m in musicas %}

<div class="card"
data-tag="{{ m.tag }}"
data-search="{{ (m.musica ~ ' ' ~ m.artista ~ ' ' ~ (m.observacao or '')) | lower }}">

<div class="musica">{{ m.musica }}</div>
<div class="artista">{{ m.artista }}</div>

{% if m.observacao %}
<div class="observacao">{{ m.observacao }}</div>
{% endif %}

</div>

{% endfor %}

</div>

<div id="nenhuma">
Nenhuma música encontrada 🎵
</div>

</div>

<script>

document.getElementById("popupBtn").onclick=function(){
document.getElementById("popup").style.display="none"
}

const search=document.getElementById("search")
const cards=document.querySelectorAll(".card")
const contador=document.getElementById("contador")
const nenhuma=document.getElementById("nenhuma")

function normalizar(texto){
return texto.toLowerCase().replace(/-/g,"").trim()
}

function extrairTags(tagString){
return normalizar(tagString).split(/\s+/).filter(t => t.length>0)
}

function atualizarBusca(){

const value=normalizar(search.value)

let encontrados=0

cards.forEach((card,i)=>{

const text=card.dataset.search
const tags=extrairTags(card.dataset.tag||"")

let mostrar=false

if(text.includes(value))mostrar=true
if(tags.includes(value))mostrar=true
if(value==="")mostrar=true

if(mostrar){

card.style.display="block"

setTimeout(()=>{
card.classList.add("show")
},i*15)

encontrados++

}else{

card.style.display="none"
card.classList.remove("show")

}

})

contador.innerText=encontrados

nenhuma.style.display=encontrados===0?"block":"none"

}

search.addEventListener("input",atualizarBusca)

function aplicarFiltro(palavra){
search.value=palavra
atualizarBusca()
}

function mostrarTodos(){
search.value=""
atualizarBusca()
}

window.onload=()=>{
atualizarBusca()
}

</script>

</body>
</html>
