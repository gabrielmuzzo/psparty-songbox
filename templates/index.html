<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSPARTY</title>

<style>

body{
font-family:'Poppins',sans-serif;
background:#111;
color:white;
margin:0;
}

.top-bar{
position:fixed;
top:0;
width:100%;
background:#000;
padding:12px;
text-align:center;
border-bottom:1px solid #222;
z-index:1000;
font-size:15px;
color:#e0e0e0;
}

.container{
max-width:600px;
margin:auto;
margin-top:60px;
padding:20px;
text-align:center;
}

.logo{
width:140px;
margin:10px auto 20px auto;
display:block;
transition:opacity .4s;
}

input{
width:90%;
padding:14px;
border-radius:20px;
border:none;
font-size:16px;
margin-bottom:20px;
}

.card{
background:#1e1e1e;
padding:15px;
margin-bottom:10px;
border-radius:10px;
border-left:4px solid #008cff;
}

.artista{
font-weight:bold;
}

.musica{
font-size:15px;
}

.observacao{
font-size:13px;
color:#bbb;
}

</style>
</head>

<body>

<div class="top-bar">
🎸 {{ total_banco }} músicas disponíveis
</div>

<div class="container">

<img src="{{ url_for('static', filename='logo.png') }}" class="logo" id="logo">

<input type="text" id="search" placeholder="Pesquisar artista ou música..." autofocus>

<div id="songs">

{% for m in musicas %}

<div class="card">

<div class="artista">{{ m.artista }}</div>
<div class="musica">{{ m.musica }}</div>

{% if m.observacao %}
<div class="observacao">{{ m.observacao }}</div>
{% endif %}

</div>

{% endfor %}

</div>

</div>

<script>

const search = document.getElementById("search")

search.addEventListener("input", function(){

const value = this.value.toLowerCase()

document.querySelectorAll(".card").forEach(card => {

const text = card.innerText.toLowerCase()

card.style.display = text.includes(value) ? "block" : "none"

})

})

</script>

</body>
</html>
