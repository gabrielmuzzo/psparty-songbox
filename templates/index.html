<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSPARTY</title>

<style>

*{
box-sizing:border-box;
}

html,body{
overflow-x:hidden;
max-width:100%;
}

body{
font-family:'Poppins',sans-serif;
margin:0;
color:white;

background:
radial-gradient(circle at 20% 20%, rgba(0,140,255,0.25), transparent 40%),
radial-gradient(circle at 80% 10%, rgba(255,255,255,0.12), transparent 40%),
radial-gradient(circle at 50% 90%, rgba(0,80,200,0.25), transparent 40%),
linear-gradient(180deg,#0a0a0a,#000814,#000000);

background-attachment:fixed;
}

body::before{
content:"△ ○ ✕ □   △ ○ ✕ □   △ ○ ✕ □";
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
font-size:120px;
letter-spacing:40px;
color:rgba(255,255,255,0.06);
transform:rotate(-20deg);
pointer-events:none;
z-index:0;
animation:flutuar 18s ease-in-out infinite;

text-shadow:
0 0 10px rgba(0,140,255,0.15),
0 0 25px rgba(0,140,255,0.1),
0 0 50px rgba(0,140,255,0.05);
}

/* barra superior NÃO fixa */

.top-bar{
width:100%;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(10px);
padding:10px;
text-align:center;
border-bottom:1px solid rgba(0,140,255,0.25);

font-size:16px;
font-weight:500;
letter-spacing:0.6px;

color:#e8f4ff;

text-shadow:
0 0 6px rgba(0,140,255,0.35);
}

.container{
max-width:600px;
margin:auto;
padding:20px;
text-align:center;
position:relative;
z-index:1;
}

.logo{
width:140px;
margin:10px auto 20px auto;
display:block;
filter:
drop-shadow(0 0 6px rgba(0,140,255,0.6))
drop-shadow(0 0 18px rgba(0,140,255,0.35))
drop-shadow(0 0 35px rgba(0,140,255,0.2));
}

.filtros{
margin-bottom:10px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
}

.filtro-btn{
background:rgba(255,255,255,0.05);
color:white;
border:1px solid rgba(255,255,255,0.15);
padding:6px 12px;
border-radius:20px;
font-size:13px;
cursor:pointer;
transition:all .15s;
white-space:nowrap;
}

.filtro-btn:hover{
background:#008cff;
border-color:#008cff;
transform:translateY(-1px);
}

.filtro-btn.destaque{
background:#008cff;
border-color:#008cff;
}

input{
width:100%;
padding:14px;
border-radius:25px;
border:none;
font-size:16px;
background:#1b1b1b;
color:white;
outline:none;
box-shadow:0 4px 15px rgba(0,0,0,0.6);
margin-bottom:20px;
}

/* CARDS */

.card{
background:linear-gradient(145deg, rgba(30,30,30,0.85), rgba(15,15,15,0.9));
padding:16px;
margin-bottom:14px;
border-radius:14px;

border:1px solid rgba(0,140,255,0.25);

backdrop-filter:blur(8px);

box-shadow:
0 6px 20px rgba(0,0,0,0.6),
0 0 0px rgba(0,140,255,0);

transition:all .4s ease;

position:relative;

/* animação inicial */

opacity:0;
transform:translateY(30px) scale(.97);
}

.card.apareceu{
opacity:1;
transform:translateY(0) scale(1);
}

.card::before{
content:"";
position:absolute;
left:0;
top:0;
height:100%;
width:4px;
background:linear-gradient(180deg,#008cff,#00d4ff);
border-radius:4px 0 0 4px;
opacity:.9;
}

.musica{
font-weight:600;
font-size:18px;
letter-spacing:.4px;
margin-bottom:2px;
}

.artista{
font-size:14px;
color:#e6e6e6;
opacity:.9;
margin-bottom:8px;
}

.observacao{
font-size:12.5px;
color:#9aa3ad;
margin-top:2px;
letter-spacing:.3px;
}

.sem-bateria,
.sem-letra,
.sem-guitarra{
color:#ff9a00;
font-weight:bold;
}

/* POPUP */

.popup-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(6px);
z-index:5000;
}

.popup-box{
background:#111;
border:1px solid rgba(255,255,255,0.15);
padding:40px;
border-radius:18px;
text-align:center;
max-width:420px;
box-shadow:0 25px 70px rgba(0,0,0,0.8);
animation:popupEntrada .35s ease;
}

.popup-icones{
font-size:32px;
letter-spacing:12px;
margin-bottom:10px;
color:#008cff;
}

.popup-title{
font-size:24px;
margin-bottom:10px;
}

.popup-text{
color:#ccc;
line-height:1.6;
margin-bottom:25px;
}

.popup-insta{
display:inline-block;
padding:14px 26px;
border-radius:30px;
font-weight:bold;
background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);
color:white;
text-decoration:none;
margin-bottom:15px;
transition:.2s;
}

.popup-insta:hover{
transform:scale(1.08);
}

.popup-btn{
display:block;
margin:15px auto 0 auto;
padding:10px 22px;
border:none;
border-radius:30px;
background:#008cff;
color:white;
cursor:pointer;
}

.popup-btn:hover{
background:#2aa3ff;
}

@keyframes popupEntrada{
from{opacity:0;transform:scale(.85);}
to{opacity:1;transform:scale(1);}
}

@keyframes flutuar{
0%{transform:rotate(-20deg) translateY(0px);}
50%{transform:rotate(-20deg) translateY(-40px);}
100%{transform:rotate(-20deg) translateY(0px);}
}

</style>
</head>

<body>

<div id="popup" class="popup-overlay">
<div class="popup-box">

<div class="popup-icones">△ ○ ✕ □</div>
<div class="popup-title">Sugira músicas 🎶</div>
<div class="popup-text">Deixe sua sugestão de músicas no nosso Instagram 😄</div>

<a class="popup-insta" href="https://instagram.com/pspartyoficial" target="_blank">
Ir para o Instagram
</a>

<button id="popupBtn" class="popup-btn">
Seguir para a lista de músicas
</button>

</div>
</div>

<div class="top-bar">
🎸 {{ total_banco }} músicas disponíveis
</div>

<div class="container">

<!-- resto do HTML continua igual -->

</div>

<script>

document.getElementById("popupBtn").onclick=function(){
document.getElementById("popup").style.display="none"
}

const search=document.getElementById("search")
const cards=document.querySelectorAll(".card")

function normalizar(texto){
return texto.toLowerCase().replace(/-/g,"").trim()
}

function extrairTags(tagString){
return normalizar(tagString).split(/\s+/).filter(t => t.length>0)
}

function aplicarFiltro(palavra, botao){

document.querySelectorAll(".filtro-btn").forEach(btn=>{
btn.classList.remove("destaque")
})

if(botao){
botao.classList.add("destaque")
}

search.value=palavra
search.dispatchEvent(new Event("input"))

}

let debounceTimer

search.addEventListener("input",function(){

clearTimeout(debounceTimer)

debounceTimer=setTimeout(()=>{

const value=normalizar(search.value)

cards.forEach(card=>{

const text=card.dataset.search
const tags=extrairTags(card.dataset.tag||"")

let mostrar=false

if(value===""){
mostrar=true
}else if(value==="hit"){
if(tags.includes("hit")) mostrar=true
}else{
if(text.includes(value)) mostrar=true
if(tags.includes(value)) mostrar=true
}

card.style.display=mostrar?"block":"none"

})

},300)

})

window.onload=function(){
aplicarFiltro("hit", document.querySelector(".filtro-btn"))
}

/* animação ao aparecer no scroll */

const observer = new IntersectionObserver((entries)=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("apareceu")
}
})
},{
threshold:0.15
})

document.querySelectorAll(".card").forEach(card=>{
observer.observe(card)
})

</script>

</body>
</html>
