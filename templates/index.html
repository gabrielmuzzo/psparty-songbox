<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSPARTY</title>

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
color:white;
overflow-x:hidden;

/* fundo gradiente */
background:
radial-gradient(circle at 20% 20%, rgba(0,140,255,0.25), transparent 40%),
radial-gradient(circle at 80% 10%, rgba(255,255,255,0.12), transparent 40%),
radial-gradient(circle at 50% 90%, rgba(0,80,200,0.25), transparent 40%),
linear-gradient(180deg,#0a0a0a,#000814,#000000);

background-attachment:fixed;
}

/* símbolos playstation no fundo */

body::before{
content:"△ ○ ✕ □   △ ○ ✕ □   △ ○ ✕ □";
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
font-size:120px;
letter-spacing:40px;
color:rgba(255,255,255,0.04);
transform:rotate(-20deg);
pointer-events:none;
z-index:0;
}

/* barra superior */

.top-bar{
position:fixed;
top:0;
width:100%;

background:rgba(0,0,0,0.85);
backdrop-filter:blur(10px);

padding:12px;
text-align:center;

border-bottom:1px solid rgba(255,255,255,0.08);

z-index:1000;
font-size:15px;
color:#e0e0e0;
}

/* container */

.container{
max-width:600px;
margin:auto;
margin-top:60px;
padding:20px;
text-align:center;
position:relative;
z-index:1;
}

/* logo */

.logo{
width:140px;
margin:10px auto 20px auto;
display:block;
}

/* filtros */

.filtros{
margin-bottom:10px;
}

.filtro-btn{

background:rgba(255,255,255,0.05);
color:white;

border:1px solid rgba(255,255,255,0.15);

padding:6px 12px;
margin:4px;

border-radius:20px;

font-size:13px;
cursor:pointer;

transition:all .15s;
}

.filtro-btn:hover{

background:#008cff;
border-color:#008cff;

transform:translateY(-1px);

}

/* busca */

input{

width:90%;
padding:14px;

border-radius:25px;
border:none;

font-size:16px;

background:#1b1b1b;
color:white;

outline:none;

box-shadow:0 4px 15px rgba(0,0,0,0.6);

margin-bottom:20px;
}

/* cards */

.card{
background:rgba(30,30,30,0.85);
padding:16px;
margin-bottom:12px;
border-radius:12px;
border-left:4px solid #008cff;

backdrop-filter:blur(6px);

box-shadow:0 6px 20px rgba(0,0,0,0.6);

transition:all .15s;
}

.card:hover{
transform:scale(1.02);
box-shadow:0 10px 30px rgba(0,140,255,0.3);
}

/* textos */

.musica{
font-weight:bold;
font-size:17px;
}

.artista{
font-size:14px;
color:#fafafa;
}

.observacao{
font-size:13px;
color:#bbb;
}

.sem-bateria{
color:#ff9a00;
font-weight:bold;
}

/*simbolos fluturantes */
  
@keyframes flutuar{
0%{transform:rotate(-20deg) translateY(0px);}
50%{transform:rotate(-20deg) translateY(-40px);}
100%{transform:rotate(-20deg) translateY(0px);}
}

body::before{
animation:flutuar 28s ease-in-out infinite;
}
  
</style>
</head>

<body>

<div class="top-bar">
🎸 {{ total_banco }} músicas disponíveis
</div>

<div class="container">

<div class="filtros">

<button class="filtro-btn" onclick="mostrarTodos()">Todos</button>
<button class="filtro-btn" onclick="aplicarFiltro('brasil')">Brasil</button>
<button class="filtro-btn" onclick="aplicarFiltro('kpop')">Kpop</button>
<button class="filtro-btn" onclick="aplicarFiltro('jrock')">Jrock</button>
<button class="filtro-btn" onclick="aplicarFiltro('jpop')">Jpop</button>
<button class="filtro-btn" onclick="aplicarFiltro('anime')">Anime</button>

</div>

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<input type="text" id="search" placeholder="Pesquisar artista, música ou anime..." autofocus>

<div id="songs">

{% for m in musicas %}

<div class="card" data-tag="{{ m.tag }}">

<div class="musica">{{ m.musica }}</div>
<div class="artista">{{ m.artista }}</div>

{% if m.observacao %}

<div class="observacao">

{{ m.observacao
| replace("Sem bateria", '<span class="sem-bateria">Sem bateria</span>')
| replace("sem bateria", '<span class="sem-bateria">sem bateria</span>')
| replace("SEM BATERIA", '<span class="sem-bateria">SEM BATERIA</span>')
| safe }}

</div>

{% endif %}

</div>

{% endfor %}

</div>

</div>

<script>

const search = document.getElementById("search")

function normalizar(texto){
return texto
.toLowerCase()
.replace(/-/g,"")
}

search.addEventListener("input", function(){

const value = normalizar(this.value)

document.querySelectorAll(".card").forEach(card => {

const text = normalizar(card.innerText)
const tag = normalizar(card.dataset.tag || "")

if(text.includes(value) || tag.includes(value)){
card.style.display = "block"
}else{
card.style.display = "none"
}

})

})

function aplicarFiltro(palavra){

search.value = palavra
search.dispatchEvent(new Event("input"))

}

function mostrarTodos(){

search.value = ""
search.dispatchEvent(new Event("input"))

}

</script>

</body>
</html>
