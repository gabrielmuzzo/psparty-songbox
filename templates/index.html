<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSPARTY</title>

<style>

body{
font-family:'Poppins',sans-serif;
background:#111;
color:white;
margin:0;
}

.top-bar{
position:fixed;
top:0;
width:100%;
background:#000;
padding:12px;
text-align:center;
border-bottom:1px solid #222;
z-index:1000;
font-size:15px;
color:#e0e0e0;
}

.container{
max-width:600px;
margin:auto;
margin-top:60px;
padding:20px;
text-align:center;
}

.logo{
width:140px;
margin:10px auto 20px auto;
display:block;
transition:opacity .4s;
}

.filtros{
margin-bottom:10px;
}

.filtro-btn{
background:#1e1e1e;
color:#fff;
border:1px solid #333;
padding:6px 12px;
margin:4px;
border-radius:12px;
font-size:13px;
cursor:pointer;
}

.filtro-btn:hover{
background:#008cff;
}

input{
width:90%;
padding:14px;
border-radius:20px;
border:none;
font-size:16px;
margin-bottom:20px;
}

.card{
background:#1e1e1e;
padding:16px;
margin-bottom:12px;
border-radius:10px;
border-left:4px solid #008cff;
}

.card:hover{
transform:scale(1.01);
transition:0.15s;
}

.musica{
font-weight:bold;
font-size:17px;
}

.artista{
font-size:14px;
color:#fafafa;
}

.observacao{
font-size:13px;
color:#bbb;
}

.sem-bateria{
color:#ff9a00;
font-weight:bold;
}

</style>
</head>

<body>

<div class="top-bar">
🎸 {{ total_banco }} músicas disponíveis
</div>

<div class="container">

<div class="filtros">

<button class="filtro-btn" onclick="mostrarTodos()">Todos</button>
<button class="filtro-btn" onclick="aplicarFiltro('brasil')">Brasil</button>
<button class="filtro-btn" onclick="aplicarFiltro('kpop')">Kpop</button>
<button class="filtro-btn" onclick="aplicarFiltro('jrock')">Jrock</button>
<button class="filtro-btn" onclick="aplicarFiltro('anime')">Anime</button>

</div>

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<input type="text" id="search" placeholder="Pesquisar artista, música ou anime..." autofocus>

<div id="songs">

{% for m in musicas %}

<div class="card" data-tag="{{ m.tag }}">

<div class="musica">{{ m.musica }}</div>
<div class="artista">{{ m.artista }}</div>

{% if m.observacao %}

<div class="observacao">

{{ m.observacao
| replace("Sem bateria", '<span class="sem-bateria">Sem bateria</span>')
| replace("sem bateria", '<span class="sem-bateria">sem bateria</span>')
| replace("SEM BATERIA", '<span class="sem-bateria">SEM BATERIA</span>')
| safe }}

</div>

{% endif %}

</div>

{% endfor %}

</div>

</div>

<script>

const search = document.getElementById("search")

function normalizar(texto){
return texto
.toLowerCase()
.replace(/-/g,"")
}

search.addEventListener("input", function(){

const value = normalizar(this.value)

document.querySelectorAll(".card").forEach(card => {

const text = normalizar(card.innerText)
const tag = normalizar(card.dataset.tag || "")

if(text.includes(value) || tag.includes(value)){
card.style.display = "block"
}else{
card.style.display = "none"
}

})

})

function aplicarFiltro(palavra){

search.value = palavra
search.dispatchEvent(new Event("input"))

}

function mostrarTodos(){

search.value = ""
search.dispatchEvent(new Event("input"))

}

</script>

</body>
</html>
